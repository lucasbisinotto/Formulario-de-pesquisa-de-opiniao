<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Nexar</title>
    <link rel="icon" href="nexar-favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <header>
            <img src="img/logo-nexar.png" alt="Logo Nexar">
            <h1>Pesquisa online</h1>
        </header>

        <section>
            <form action="" method="get">

                <fieldset> 
                    <!-- Dados pessoais -->
                    <legend>Dados pessoais</legend>

                    <label for="idName">Nome:</label>
                    <input id="idName" type="text" name="userName" required>
                    <br>
                    
                    <label for="idAge">Idade:</label>
                    <input id="idAge" type="number" name="age" min="12" max="100" required>
                    <br>

                    <label for="idBirthDate">Data de nascimento:</label>
                    <input id="idBirthDate" type="date" name="birthDate">
                    <br>

                    <label for="idEmail">E-mail:</label>
                    <input id="idEmail" type="email" name="email" required>
                    <br>

                    <label for="idPhone">Telefone:</label>
                    <input id="idPhone" type="tel" name="phone" pattern="[0-9]{11}" placeholder="DDD+número">
                    <br>

                    <label for="idPhoto">Upload de foto:</label>
                    <input id="idPhoto" type="file" accept="image/*" name="photo">
                    <br> 
                </fieldset>
                    
                <fieldset>
                    <!-- Perfil -->
                    <legend>Perfil</legend>
                    
                    <p>Gênero:</p>
                    <input id="idMasculine" type="radio" name="gender" value="masculine">
                    <label for="idMasculine">Masculino</label>

                    <input id="idFeminine" type="radio" name="gender" value="feminine">
                    <label for="idFeminine">Feminino</label>
                    <br>

                    <label for="idMaritalStatus">Estado civil:</label>
                    <select id="idMaritalStatus" name="maritalStatus">
                        <option value="notSelected">Selecione...</option>
                        <option value="single">Solteiro</option>
                        <option value="married">Casado</option>
                        <option value="separated">Separado</option>
                        <option value="divorced">Divorciado</option>
                        <option value="commonLawMarriage">União Estável</option>
                        <option value="widowed">Viúvo</option>
                    </select>
                    <br>

                    <label for="idState">Estado:</label>
                    <select id="idState" name="state" required>
                        <option value="acre">Acre</option>
                        <option value="alagoas">Alagoas</option>
                        <option value="amapa">Amapá</option>
                        <option value="amazonas">Amazonas</option>
                        <option value="bahia">Bahia</option>
                        <option value="ceara">Ceará</option>
                        <option value="distritoFederal">Distrito Federal</option>
                        <option value="espiritoSanto">Espirito Santo</option>
                        <option value="goias">Goiás</option>
                        <option value="maranhao">Maranhão</option>
                        <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                        <option value="matoGrosso">Mato Grosso</option>
                        <option value="minasGerais">Minas Gerais</option>
                        <option value="para">Pará</option>
                        <option value="paraiba">Paraíba</option>
                        <option value="parana">Paraná</option>
                        <option value="pernambuco">Pernambuco</option>
                        <option value="piaui">Piauí</option>
                        <option value="rioDeJaneiro">Rio de Janeiro</option>
                        <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                        <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                        <option value="rondonia">Rondônia</option>
                        <option value="roraima">Roraima</option>
                        <option value="santaCatarina">Santa Catarina</option>
                        <option value="saoPaulo">São Paulo</option>
                        <option value="sergipe">Sergipe</option>
                        <option value="tocantins">Tocantins</option>
                    </select>
                    <br>

                    <label for="idCity">Cidade:</label>
                    <input id="idCity" type="text" name="city"> 
                </fieldset>

                <fieldset>
                    <!-- Hábitos -->
                    <legend>Hábitos</legend>

                    <p>Redes sociais:</p>
                    <input id="idLinkedin" type="checkbox" name="social" value="linkedin">
                    <label for="idLinkedin">Linkedin</label>
                    <br>

                    <input id="idGithub" type="checkbox" name="social" value="github">
                    <label for="idGithub">GitHub</label>
                    <br>

                    <input id="idInstagram" type="checkbox" name="social" value="instagram">
                    <label for="idInstagram">Instagram</label>
                    <br>
                    
                    <input id="idFacebook" type="checkbox" name="social" value="facebook">
                    <label for="idFacebook">Facebook</label>
                    <br>

                    <label for="idMusicstyle">Estilo musical:</label>
                    <input id="idMusicstyle" type="text" name="musicStyle" list="idDatalistMusic">
                    <datalist id="idDatalistMusic">
                        <option value="Sertanejo">
                        <option value="Rock">
                        <option value="Samba">
                    </datalist>
                    <br>

                    <label for="idColor">Cor favorita:</label>
                    <input type="color" name="favoriteColor" id="idColor"> 
                </fieldset>

                <fieldset>
                    <!-- Opinião -->
                    <legend>Opinião</legend>

                    <p>Satisfação:</p>
                    <input  id="idOtima" type="radio" name="satisfacao" value="otima">
                    <label for="idOtima">Ótima</label>

                    <input  id="idBoa" type="radio" name="satisfacao" value="boa">
                    <label for="idBoa">Boa</label>
                    
                    <input  id="idRegular" type="radio" name="satisfacao" value="regular">
                    <label for="idRegular">Regular</label>

                    <input  id="idRuim" type="radio" name="satisfacao" value="ruim">
                    <label for="idRuim">Ruim</label>
                    <br>

                    <label for="comentarioOpiniao">Comentário:</label>
                    <textarea name="comentario" placeholder="Digite aqui sua opinião..." id="comentarioOpiniao"></textarea>
                </fieldset>

                <fieldset>
                    <!-- Confirmações -->
                    <legend>Confirmações</legend>

                    <input id="idLgpd" type="checkbox" name="lgpd" required>
                    <label for="idLgpd">Tenho ciência que meus dados serão usados de acordo com a LGPD</label>
                    <br>

                    <input id="idReceberEmail" type="checkbox" name="receberEmail">
                    <label for="idReceberEmail">Desejo receber resultados por E-mail</label>
                </fieldset>

                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>

            </form>
        </section>
    </main>
</body>
</html>
